---
apiVersion: v1
kind: Namespace
metadata:
 name: wordpress

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress
  labels:
    app: wordpress
spec:
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: wordpress
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: wordpress
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "wordpress"
        vault.hashicorp.com/agent-inject-secret-db-user: "kv/data/wordpress"
        vault.hashicorp.com/agent-inject-template-db-user: |
          {{- with secret "kv/data/wordpress" -}}{{ .Data.data.username }}{{- end -}}
        vault.hashicorp.com/agent-inject-secret-db-password: "kv/data/wordpress"
        vault.hashicorp.com/agent-inject-template-db-password: |
          {{- with secret "kv/data/wordpress" -}}{{ .Data.data.password }}{{- end -}}
    spec:
      serviceAccountName: wordpress
      containers:
        - image: wordpress:6.8.1-apache
          name: wordpress
          env:
            - name: WORDPRESS_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: wordpress-configmap
                  key: wp_db_host
            - name: WORDPRESS_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: wordpress-configmap
                  key: wp_db_name
            - name: WORDPRESS_DB_USER_FILE
              value: /vault/secrets/db-user
            - name: WORDPRESS_DB_PASSWORD_FILE
              value: /vault/secrets/db-password
            - name: WORDPRESS_CONFIG_EXTRA
              value: "define('FS_METHOD', 'direct');"
          ports:
            - containerPort: 80
              name: wordpress
          livenessProbe:
            httpGet:
              path: /wp-login.php
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /wp-login.php
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
           requests:
             cpu: "100m"
             memory: "256Mi"
           limits:
             cpu: "500m"
             memory: "512Mi"
          volumeMounts:
            - name: wp-pv-volume
              mountPath: /var/www/html
      volumes:
        - name: wp-pv-volume
          persistentVolumeClaim:
            claimName: wordpress-pv-claim
